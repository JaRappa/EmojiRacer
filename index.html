<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Emoji Racer</title>
  <link rel="icon" type="image/png" href="/RaceFavicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; width: 100%; height: 100%; }
    #hud {
      position: absolute; top: 8px; left: 8px;
      color: #fff; font-family: monospace; font-size: 14px;
      pointer-events: none; z-index: 10;
      background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 4px;
    }

    /* ── Menu screens overlay ─────────────────────────────── */
    #screens {
      position: absolute; inset: 0; z-index: 20;
      pointer-events: none;
    }
    .screen {
      position: absolute; inset: 0;
      display: flex;
      align-items: center; justify-content: center;
      pointer-events: auto;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    /* ── Menu content box ─────────────────────────────────── */
    .menu-content {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
      background: rgba(10, 10, 30, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 36px 40px;
      min-width: 300px;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .menu-title {
      font-size: 28px; font-weight: 700;
      margin: 0; text-align: center;
    }
    .menu-subtitle {
      font-size: 14px; opacity: 0.6; margin: -8px 0 4px 0;
    }
    .menu-footer {
      font-size: 11px; opacity: 0.35; margin-top: 8px;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .menu-btn {
      display: block; width: 100%;
      padding: 12px 20px;
      font-size: 18px; font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.16); }
    .menu-btn:active { transform: scale(0.97); }
    .back-btn {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.06);
      font-size: 15px;
    }

    /* ── Track list ────────────────────────────────────────── */
    .track-list {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%;
    }
    .track-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .track-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .track-emoji {
      font-size: 36px; flex-shrink: 0;
    }
    .track-info { text-align: left; }
    .track-name { font-size: 16px; font-weight: 600; margin: 0; }
    .track-desc { font-size: 12px; opacity: 0.55; margin: 2px 0 0 0; }

    /* ── Options ───────────────────────────────────────────── */
    .options-placeholder {
      font-size: 14px; opacity: 0.5; text-align: center; padding: 12px 0;
    }

    /* ── Back-to-menu in sandbox ──────────────────────────── */
    #back-to-menu {
      position: absolute; top: 8px; right: 8px; z-index: 30;
      display: none;
      padding: 6px 14px;
      font-size: 13px; font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #back-to-menu:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <button id="back-to-menu">← Menu</button>
  <div id="screens"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
